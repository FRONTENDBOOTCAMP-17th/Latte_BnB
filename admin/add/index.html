<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>latte-bnb | 관리자 숙소 추가</title>
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <div
      id="toast"
      class="border-2 border-primary-800 rounded-2xl p-4 top-4/5 left-1/2 -translate-x-1/2">
      <p id="toastMessage" class="font-semibold"></p>
      <p id="toastDetail" class="text-sm"></p>
    </div>
    <main
      class="min-w-100 min-h-screen bg-gradient-to-t grid grid-cols-1 auto-rows-min from-primary-200 via-primary-400 to-primary-300">
      <a
        href="/"
        id="logo"
        class="w-fit h-15 text-primary-300 flex items-center justify-start justify-self-center focus:outline-primary-500 focus:outline-offset-10 focus:rounded-xl">
        <svg
          class="w-12 h-12"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 320"
          role="img"
          aria-label="latte bnb 로고">
          <path
            fill="white"
            d="M128 12 C78 12 38 52 38 102 C38 170 93 220 121 248 C125 252 131 252 135 248 C163 220 218 170 218 102 C218 52 178 12 128 12Z" />
          <path
            fill="currentColor"
            d="M127 70 L80 105 C77 108 78 114 82 114 L88 114 L88 150 C88 154 91 157 95 157 L161 157 C165 157 168 154 168 150 L168 114 L175 114 C180 114 181 108 178 106 L160 94 L160 74 C160 71 158 69 155 69 L145 69 C142 69 140 71 140 74 L140 79 L133 73 C130 70 126 70 123 73Z" />
          <rect x="110" y="108" width="14" height="14" rx="2" fill="white" />
          <rect x="132" y="108" width="14" height="14" rx="2" fill="white" />
          <rect x="110" y="130" width="14" height="14" rx="2" fill="white" />
          <rect x="132" y="130" width="14" height="14" rx="2" fill="white" />
        </svg>
        <p class="font-semibold text-2xl text-white">lattebnb</p>
      </a>
      <form
        id="addForm"
        method="post"
        class="self-start p-5 border-t-2 border-primary-400">
        <fieldset
          class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
          <legend class="font-semibold text-white text-2xl mb-10">
            숙소 정보 입력
          </legend>
          <div class="flex flex-col md:col-start-1 md:-col-end-1 lg:col-end-3">
            <label for="title" class="adminLabel">숙소 이름</label>
            <input type="text" name="title" id="title" class="adminInputText" />
          </div>
          <div class="flex flex-col lg:row-start-2">
            <label for="thumbnail" class="adminLabel">대표 이미지</label>
            <input
              type="file"
              name="thumbnail"
              id="thumbnail"
              accept="image/*"
              class="hidden" />
            <div id="thumbnailPreview" class="p-5">
              <img
                id="preview"
                class="w-full aspect-square object-cover hidden rounded-2xl" />
              <button
                id="uploadThumbnail"
                type="button"
                class="adminThumbnailUpload">
                <div
                  class="flex justify-center items-center text-primary-50 gap-2 text-sm">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                  </svg>
                  썸네일 추가
                </div>
              </button>
              <button
                id="deleteThumbnail"
                type="button"
                class="w-full h-fit bg-primary-500 text-white rounded-2xl p-1 my-1 hidden hover:bg-primary-500/70">
                <div
                  class="flex justify-center items-center text-primary-50 gap-2 text-sm">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                  </svg>
                  썸네일 삭제
                </div>
              </button>
            </div>
          </div>
          <div class="flex flex-col lg:row-start-2 lg:col-start-3">
            <label for="region" class="adminLabel">지역</label>
            <input
              type="text"
              name="region"
              id="region"
              class="adminInputText"
              autocomplete="off" />
            <label for="address" class="adminLabel">상세 주소</label>
            <input
              type="text"
              name="address"
              id="address"
              class="adminInputText"
              autocomplete="off" />
          </div>
          <div
            class="flex flex-col md:col-start-2 md:row-start-3 lg:row-start-2 lg:col-start-4 lg:self-start">
            <label for="maxGuest" class="adminLabel">최대 수용 인원</label>
            <div
              class="numberInput flex items-center"
              data-name="maxGuest"
              data-id="maxGuest"></div>
          </div>
          <div
            class="flex flex-col lg:row-start-2 lg:col-start-3 lg:col-span-2 lg:self-end lg:h-2/3 lg:row-span-2">
            <label for="description" class="adminLabel">숙소 설명</label>
            <textarea
              name="description"
              id="description"
              class="adminInputText resize-none min-h-40 h-full"></textarea>
          </div>
          <div class="flex flex-col lg:row-start-3">
            <label for="adultPrice" class="adminLabel flex justify-between"
              ><span>성인 1박 요금</span><span>(단위: 원)</span></label
            >
            <input
              type="text"
              name="adultPrice"
              id="adultPrice"
              class="adminInputText" />
            <label for="childPrice" class="adminLabel flex justify-between"
              ><span>어린이 1박 요금</span><span>(단위: 원)</span></label
            >
            <input
              type="text"
              name="childPrice"
              id="childPrice"
              class="adminInputText" />
            <label for="serviceFee" class="adminLabel flex justify-between"
              ><span>서비스 요금</span><span>(단위: 원)</span></label
            >
            <input
              type="text"
              name="serviceFee"
              id="serviceFee"
              class="adminInputText" />
          </div>
          <div
            class="flex flex-col md:col-start-2 md:row-start-3 md:self-end lg:row-start-2 lg:col-start-4 lg:self-start lg:translate-y-full">
            <label for="minNights" class="adminLabel">최소 숙박 가능일</label>
            <div
              class="numberInput flex items-center"
              data-name="minNights"
              data-id="minNights"></div>
          </div>
          <div
            class="w-full grid grid-cols-2 lg:grid-cols-4 justify-self-start lg:self-center gap-5 lg:col-span-2">
            <div class="lg:col-span-2">
              <label for="checkInTime" class="adminLabel">체크인 시간</label>
              <input type="time" name="checkInTime" id="checkInTime" />
            </div>
            <div class="lg:col-span-2">
              <label for="checkOutTime" class="adminLabel">체크아웃 시간</label>
              <input type="time" name="checkOutTime" id="checkOutTime" />
            </div>
          </div>
          <div class="flex flex-col md:row-start-2 md:col-start-2">
            <label for="images" class="adminLabel"
              >숙소 이미지(다중 선택 가능)</label
            >
            <input
              type="file"
              name="images"
              id="images"
              accept="image/*"
              multiple
              class="hidden" />
            <div
              id="imagesPreview"
              class="imageContainer w-full flex flex-nowrap gap-5 overflow-x-auto p-5 rounded-xl">
              <button
                id="uploadImagesBtn"
                type="button"
                class="adminImagesUpload">
                <div
                  class="flex justify-center items-center text-primary-50 gap-2 text-sm">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-6">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
                  </svg>
                  숙소 이미지 추가
                </div>
              </button>
            </div>
          </div>
          <div
            class="grid grid-cols-2 grid-rows-[repeat(4,min-content)] gap-2 lg:row-start-3">
            <p class="adminLabel col-start-1 -col-end-1">예약 불가 날짜</p>
            <span class="text-xs text-shark-700 col-start-1 -col-end-1">
              하루만 지정하고 싶은 경우 시작일, 종료일을 동일하게 지정
            </span>
            <div class="w-fit">
              <label for="startDate" class="adminLabel">시작일</label>
              <input
                type="date"
                name="startDate"
                id="startDate"
                max="9999-12-31"
                class="adminInputDate" />
            </div>
            <div class="w-fit">
              <label for="endDate" class="adminLabel">종료일</label>
              <input
                type="date"
                name="endDate"
                id="endDate"
                max="9999-12-31"
                class="adminInputDate" />
            </div>
          </div>
        </fieldset>
      </form>
      <button
        type="submit"
        form="addForm"
        class="w-3/4 max-w-lg place-self-center font-semibold text-2xl text-white bg-primary-500 hover:bg-primary-500/80 m-5 p-4 rounded-3xl">
        등록하기
      </button>
      <div
        id="modal"
        class="fixed inset-0 w-full min-h-full bg-black/30 backdrop-blur-[4px] hidden">
        <div
          id="modalBody"
          class="fixed grid grid-cols-1 inset-1/2 -translate-1/2 min-w-90 w-full max-w-md h-fit px-8 py-4 bg-primary-300 rounded-2xl">
          <h3 class="text-2xl text-white font-extrabold mt-10">
            이미지 이름, 설명 입력
          </h3>
          <img
            alt="selected image"
            id="selectedImage"
            class="w-full min-w-80 aspect-square object-scale-down rounded-2xl" />
          <div class="flex flex-col items-center justify-center gap-2">
            <label for="imageTitle" class="text-white font-semibold self-start"
              >제목</label
            >
            <input
              type="text"
              name="imageTitle"
              id="imageTitle"
              class="adminInputText w-full" />
          </div>
          <div class="flex flex-col items-center justify-center gap-2">
            <label
              for="imageDescription"
              class="text-white font-semibold self-start"
              >설명</label
            >
            <input
              type="text"
              name="imageDescription"
              id="imageDescription"
              class="adminInputText w-full" />
          </div>
          <button
            id="apply"
            type="button"
            class="w-3/4 place-self-center font-semibold text-md text-white bg-primary-500 hover:bg-primary-500/80 m-5 p-2 rounded-3xl">
            확인
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
