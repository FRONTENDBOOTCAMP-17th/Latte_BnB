<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>latte-bnb</title>
    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/landing.js"></script>
  </head>
  <body>
    <header
      class="bg-shark-100/55 flex flex-col lg:flex-row items-center lg:justify-between px-5 pb-5 pt-2 border-b-2 border-shark-200">
      <div
        id="logo"
        class="w-fit h-15 text-primary-400 flex items-center justify-start">
        <svg
          class="w-12 h-12"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 320"
          role="img"
          aria-label="latte bnb 로고">
          <path
            fill="currentColor"
            d="M128 12
         C78 12 38 52 38 102
         C38 170 93 220 121 248
         C125 252 131 252 135 248
         C163 220 218 170 218 102
         C218 52 178 12 128 12Z" />
          <path
            fill="#FFFFFF"
            d="M127 70
         L80 105
         C77 108 78 114 82 114
         L88 114
         L88 150
         C88 154 91 157 95 157
         L161 157
         C165 157 168 154 168 150
         L168 114
         L175 114
         C180 114 181 108 178 106
         L160 94
         L160 74
         C160 71 158 69 155 69
         L145 69
         C142 69 140 71 140 74
         L140 79
         L133 73
         C130 70 126 70 123 73
         Z" />
          <rect
            x="110"
            y="108"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="132"
            y="108"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="110"
            y="130"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="132"
            y="130"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
        </svg>
        <a href="/" class="font-semibold text-2xl">lattebnb</a>
      </div>
      <input
        type="text"
        id="searchInput"
        class="max-w-xl w-full h-10 bg-white text-shark-800 px-4 py-2 rounded-3xl shadow-md placeholder:text-shark-600 placeholder:font-medium placeholder:text-center placeholder:bg-[url(./src/assets/search.svg)] placeholder:bg-no-repeat placeholder:bg-[calc(50%-6rem)_0%]"
        placeholder="특별한 공간 탐색하기" />
      <div
        class="hidden lg:flex lg:w-10 lg:aspect-square lg:bg-shark-200 lg:text-shark-700 lg:rounded-[50%] lg:items-center lg:justify-center lg:cursor-pointer">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="size-6">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </div>
    </header>
    <h1
      class="scroll-m-20 text-4xl font-extrabold tracking-tight text-balance m-10">
      Rooms | 특별한 추억을 남길 수 있는 공간을 찾아보세요.
    </h1>
    <ul
      id="roomList"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-5 px-[clamp(20px,4vw,80px)]"></ul>
  </body>
</html>
