<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>회원가입 페이지</title>
    <style>
      #signup {
        display: flex;
        flex-flow: wrap column;
        justify-content: center;
        min-width: 400px;
        border-radius: 10px;
        margin: 2rem;
        padding-block-start: 1rem;
      }

      #lattebnb {
        display: flex;
        justify-content: center;
        margin-block-end: 3rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-shark-700);
      }

      #personalData {
        display: grid;
        grid-template-columns: 6rem 1fr;
        grid-template-rows: repeat(8, 45px);
        row-gap: 0.5rem;
      }

      #id,
      #pwd,
      #name,
      #phone {
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--color-shark-400);
        letter-spacing: 0.2rem;
      }

      #latteId,
      #lattePw,
      #latteNm,
      #lattePn {
        padding: 0.75rem;
        margin-inline-end: 2rem;
        border: 1px solid var(--color-shark-400);
        border-radius: 1rem;
      }

      #result1,
      #result2,
      #result3,
      #result4 {
        display: flex;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #result5 {
        display: flex;
        justify-content: center;
        white-space: pre-line;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #lattebtn {
        display: flex;
        justify-content: center;
        align-self: center;
        cursor: pointer;
        inline-size: 10rem;
        margin-block-start: 1rem;
        padding: 1rem;
        border-radius: 0.5rem;
        background-color: var(--color-primary-300);
        color: var(--color-white);
        transition-duration: 500ms;
      }

      #lattebtn:hover {
        background-color: var(--color-white);
        color: var(--color-primary-300);
        box-shadow: 0 0 0 2px var(--color-primary-300);
      }

      @media (min-width: 768px) {
        #signup {
          width: 450px;
          justify-self: center;
        }
      }

      @media (min-width: 1920px) {
        #signup {
          width: 600px;
          justify-self: center;
        }
      }
    </style>
  </head>
  <body>
    <div id="signup">
      <p id="lattebnb">라떼비앤비에 오신 것을 환영합니다!</p>
      <div id="personalData">
        <label id="id" for="latteId">아이디</label>
        <input type="text" id="latteId" placeholder="아이디를 입력해주세요." />
        <p></p>
        <p id="result1"></p>

        <label id="pwd" for="lattePw">비밀번호</label>
        <input
          type="password"
          id="lattePw"
          placeholder="비밀번호를 입력해주세요." />
        <p></p>
        <p id="result2"></p>

        <label id="name" for="latteNm">이름</label>
        <input type="text" id="latteNm" placeholder="이름을 입력해주세요." />
        <p></p>
        <p id="result3"></p>

        <label id="phone" for="lattePn">전화번호</label>
        <input type="text" id="lattePn" placeholder="예) 010-1234-5678" />
        <p></p>
        <p id="result4"></p>
      </div>
      <p id="result5"></p>
      <button type="submit" id="lattebtn">회원가입</button>
    </div>
  </body>
</html>
