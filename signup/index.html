<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/main.js"></script>
    <script type="module" src="./index.js"></script>

    <title>latte-bnb | 회원가입</title>
  </head>
  <body class="bg-white md:bg-primary-50 text-shark-800">
    <main
      class="max-w-3xl mx-auto min-h-screen flex items-center justify-center md:items-stretch px-6 py-10">
      <div class="hidden md:flex md:items-center md:justify-center w-1/2">
        <img
          src="../src/assets/phonemockup.png"
          class="max-h-150 object-contain" />
      </div>
      <div
        class="w-full max-w-sm md:max-w-none md:w-1/2 md:bg-white md:border md:border-shark-200 px-8 py-7 md:flex md:flex-col md:justify-center">
        <p class="text-base text-shark-800 font-semibold mb-5 leading-snug">
          오늘의 여행을 더 특별하게,<br />latteBnB에서 나만의 숙소를 만나보세요
        </p>

        <form id="signupForm" class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="latteId" class="text-sm font-semibold text-shark-600"
              >아이디</label
            >
            <input
              type="text"
              id="latteId"
              placeholder="아이디를 입력해주세요."
              class="w-full px-3 py-3 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
            <p id="result1" class="text-xs text-negative-500"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="lattePw" class="text-sm font-semibold text-shark-600"
              >비밀번호</label
            >
            <div class="relative">
              <input
                type="password"
                id="lattePw"
                placeholder="비밀번호를 입력해주세요."
                class="w-full px-3 py-3 pr-10 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
              <button
                type="button"
                id="togglePass"
                class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-shark-400 p-1 hover:text-shark-600">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
            <p id="result2" class="text-xs text-negative-500"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="latteNm" class="text-sm font-semibold text-shark-600"
              >이름</label
            >
            <input
              type="text"
              id="latteNm"
              placeholder="이름을 입력해주세요."
              class="w-full px-3 py-3 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
            <p id="result3" class="text-xs text-negative-500"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="lattePn" class="text-sm font-semibold text-shark-600"
              >전화번호</label
            >
            <input
              type="text"
              id="lattePn"
              placeholder="예) 010-1234-5678"
              class="w-full px-3 py-3 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
            <p id="result4" class="text-xs text-negative-500"></p>
          </div>

          <p id="result5" class="text-xs text-negative-500 text-center"></p>

          <button
            type="submit"
            id="signupbtn"
            class="w-full p-4 rounded-lg text-base font-semibold cursor-pointer bg-primary-400 text-shark-50 hover:bg-primary-500">
            회원가입
          </button>
        </form>

        <p class="text-sm text-shark-500 text-center mt-4">
          이미 계정이 있으신가요?
          <a
            href="../login/"
            class="font-semibold text-primary-400 hover:text-primary-500">
            로그인
          </a>
        </p>
      </div>
    </main>
  </body>
</html>
