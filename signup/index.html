<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>회원가입 페이지</title>
  </head>
  <body class="bg-white text-shark-700">
    <div
      id="signup"
      class="mx-auto my-8 flex min-w-[400px] max-w-[600px] flex-col justify-center rounded-[10px] pt-4 md:w-[450px] 2xl:w-[600px]">
      <p
        id="lattebnb"
        class="mb-12 flex justify-center text-center text-2xl font-bold text-shark-700">
        라떼비앤비에 오신 것을 환영합니다!
      </p>
      <div
        id="personalData"
        class="grid grid-cols-[6rem_1fr] grid-rows-8 gap-y-2">
        <label
          id="id"
          for="latteId"
          class="flex h-[45px] items-center justify-center tracking-[0.2rem] text-shark-400"
          >아이디</label
        >
        <input
          type="text"
          id="latteId"
          placeholder="아이디를 입력해주세요."
          class="mr-8 h-[45px] rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-[45px]"></p>
        <p
          id="result1"
          class="flex h-[45px] items-center text-xs font-bold"></p>

        <label
          id="pwd"
          for="lattePw"
          class="flex h-[45px] items-center justify-center tracking-[0.2rem] text-shark-400"
          >비밀번호</label
        >
        <input
          type="password"
          id="lattePw"
          placeholder="비밀번호를 입력해주세요."
          class="mr-8 h-[45px] rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-[45px]"></p>
        <p
          id="result2"
          class="flex h-[45px] items-center text-xs font-bold"></p>

        <label
          id="name"
          for="latteNm"
          class="flex h-[45px] items-center justify-center tracking-[0.2rem] text-shark-400"
          >이름</label
        >
        <input
          type="text"
          id="latteNm"
          placeholder="이름을 입력해주세요."
          class="mr-8 h-[45px] rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-[45px]"></p>
        <p
          id="result3"
          class="flex h-[45px] items-center text-xs font-bold"></p>

        <label
          id="phone"
          for="lattePn"
          class="flex h-[45px] items-center justify-center tracking-[0.2rem] text-shark-400"
          >전화번호</label
        >
        <input
          type="text"
          id="lattePn"
          placeholder="예) 010-1234-5678"
          class="mr-8 h-[45px] rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-[45px]"></p>
        <p
          id="result4"
          class="flex h-[45px] items-center text-xs font-bold"></p>
      </div>
      <p
        id="result5"
        class="flex justify-center whitespace-pre-line text-center text-xs font-bold"></p>
      <button
        type="submit"
        id="lattebtn"
        class="mt-4 inline-flex w-40 cursor-pointer self-center rounded-lg bg-primary-300 px-4 py-4 text-center text-white transition duration-500 hover:bg-white hover:text-primary-300 hover:ring-2 hover:ring-primary-300">
        회원가입
      </button>
    </div>
  </body>
</html>
