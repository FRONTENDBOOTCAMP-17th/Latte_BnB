<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>예약 확인 페이지</title>
    <style>
      #list {
        font-size: 2rem;
        font-weight: 700;
        margin: 1rem 1rem 0;
        inline-size: 100%;
      }

      #reservation-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        margin: 2rem 2rem 6rem;
      }

      .reservation-card {
        box-shadow: 0 0 0 2px var(--color-shark-300);
        padding: 1rem;
        border-radius: 8px;
        inline-size: 100%;
        margin-inline: auto;
      }

      @media (min-width: 768px) {
        #reservation-list {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 1rem;
        }
      }

      @media (min-width: 1024px) {
        #reservation-list {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 1rem;
        }

        #nav-bar {
          visibility: hidden;
        }
      }

      @media (max-width: 1023px) {
        body footer {
          display: none;
        }
      }

      .img {
        inline-size: 100%;
        margin-block-end: 1rem;
      }

      .name {
        font-weight: 700;
      }

      html,
      body {
        display: flex;
        flex-flow: wrap column;
        overflow-x: hidden;

        #result {
          font-weight: 700;
          align-self: center;
        }
      }

      #nav-bar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: #686868;
        position: fixed;
        inset: auto 0 0 0;
      }

      #search,
      #wish,
      #rsv,
      #profile {
        display: flex;
        flex-flow: wrap column;
        row-gap: 0.5rem;
        padding-block: 0.5rem;

        @media (max-width: 1023px) {
          box-shadow:
            -10px 0 10px -8px rgba(0, 0, 0, 0.2),
            10px 0 10px -8px rgba(0, 0, 0, 0.2);
        }
      }

      #search1,
      #search2,
      #wish2,
      #rsv2,
      #profile2 {
        display: flex;
        align-self: center;
        color: var(--color-white);
      }
    </style>
  </head>
  <body>
    <h1 id="list">내 예약 목록</h1>
    <ul id="reservation-list"></ul>
    <p id="result"></p>
    <div id="nav-bar">
      <div id="search">
        <img
          id="search1"
          src="../src/assets/search.svg"
          alt=""
          width="24"
          height="24" />
        <p id="search2">검색</p>
      </div>
      <div id="wish">
        <img id="wish1" src="../src/assets/wish.svg" alt="" />
        <p id="wish2">위시리스트</p>
      </div>
      <div id="rsv">
        <img id="rsv1" src="../src/assets/reservation.svg" alt="" />
        <p id="rsv2">예약</p>
      </div>
      <div id="profile">
        <img id="profile1" src="../src/assets/profile.svg" alt="" />
        <p id="profile2">프로필</p>
      </div>
    </div>

    <script>
      const rsvList = document.getElementById('reservation-list');
      const result = document.getElementById('result');
      const token = localStorage.getItem('accessToken');

      async function loadReservation() {
        try {
          const res = await fetch(
            'https://api.fullstackfamily.com/api/lattebnb/v1/me/reservations',
            {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
            },
          );

          if (!res.ok) {
            throw new Error('HTTP 오류: ' + res.stauts);
          }

          const rsvData = await res.json();
          const rsv = rsvData.data.reservations;
          const amdData = rsv.accommodation;
          const schData = rsv.schedule;

          if (rsv.length === 0) {
            result.textContent = '예약 내역이 없습니다.';
            return;
          }

          rsvList.textContent = '';

          for (let i = 0; i < rsv.length; i++) {
            const amd = amdData[i];
            const sch = schData[i];

            const resDiv = document.createElement('div');
            const cardDiv = document.createElement('div');
            cardDiv.className = 'reservation-card';
            const cardImg = document.createElement('img');
            cardImg.className = 'img';
            const cardName = document.createElement('p');
            cardName.className = 'name';
            const cardPeriod = document.createElement('p');

            cardImg.src = amd.thumbnailUrl;
            cardName.textContent = amd.title;
            cardPeriod.textContent = sch.checkInDate + '~' + sch.checkOutDate;

            cardDiv.appendChild(cardImg);
            cardDiv.appendChild(cardName);
            cardDiv.appendChild(cardPeriod);
            resDiv.appendChild(cardDiv);
            rsvList.appendChild(resDiv);

            localStorage.setItem(rsv.status);
            console.log(rsv.status);
          }
        } catch (e) {
          result.textContent = '에러 발생: ' + e.message;
          result.sytle.color = 'red';
        }
      }

      loadReservation();

      const search = document.getElementById('search');
      const wish = document.getElementById('wish');
      const rsv = document.getElementById('rsv');
      const profile = document.getElementById('profile');

      search.addEventListener('click', () => {
        location.href = `../index.html`;
      });

      wish.addEventListener('click', () => {
        location.href = `../index.html`;
      });

      rsv.addEventListener('click', () => {
        location.href = `./`;
      });

      profile.addEventListener('click', () => {
        location.href = `../profile/index.html`;
      });
    </script>
  </body>
</html>
