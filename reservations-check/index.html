<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/main.js"></script>
    <script type="module" src="./index.js"></script>
    <title>latte-bnb | 예약 목록</title>
  </head>
  <body
    data-header="true"
    data-footer="true"
    data-nav="true"
    class="overflow-x-hidden max-[1023px]:[&_footer]:hidden">
    <main class="min-w-100 pb-20">
      <h1
        id="list"
        class="scroll-m-20 break-keep px-[clamp(20px,4vw,80px)] py-6 text-[clamp(1.5rem,4vw,2.25rem)] font-extrabold tracking-tight">
        나의 예약 목록
      </h1>
      <p id="result" class="pt-4 text-center font-bold"></p>
      <ul
        id="reservation-list"
        class="mx-auto grid w-full max-w-[1200px] grid-cols-1 gap-5 px-[clamp(20px,4vw,80px)] pt-5 md:grid-cols-2 xl:grid-cols-3"></ul>
    </main>
  </body>
</html>
