<!doctype html>
  <html lang="ko-KR" class="flex flex-col flex-wrap overflow-x-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>예약 확인 페이지</title>
  </head>
  <body class="flex flex-col flex-wrap overflow-x-hidden max-[1023px]:[&_footer]:hidden">
    <h1 id="list" class="m-4 mb-0 w-full text-[2rem] font-bold">내 예약 목록</h1>
    <ul
      id="reservation-list"
      class="mx-8 mt-8 mb-24 grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4"></ul>
    <p id="result" class="self-center font-bold"></p>
    <div
      id="nav-bar"
      class="fixed inset-x-0 bottom-0 grid grid-cols-4 bg-[#686868] lg:invisible">
      <div
        id="search"
        class="flex flex-col flex-wrap gap-y-2 py-2 max-[1023px]:shadow-[-10px_0_10px_-8px_rgba(0,0,0,0.2),10px_0_10px_-8px_rgba(0,0,0,0.2)]">
        <img
          id="search1"
          class="flex self-center text-white"
          src="../src/assets/search.svg"
          alt=""
          width="24"
          height="24" />
        <p id="search2" class="flex self-center text-white">검색</p>
      </div>
      <div
        id="wish"
        class="flex flex-col flex-wrap gap-y-2 py-2 max-[1023px]:shadow-[-10px_0_10px_-8px_rgba(0,0,0,0.2),10px_0_10px_-8px_rgba(0,0,0,0.2)]">
        <img id="wish1" src="../src/assets/wish.svg" alt="" />
        <p id="wish2" class="flex self-center text-white">위시리스트</p>
      </div>
      <div
        id="rsv"
        class="flex flex-col flex-wrap gap-y-2 py-2 max-[1023px]:shadow-[-10px_0_10px_-8px_rgba(0,0,0,0.2),10px_0_10px_-8px_rgba(0,0,0,0.2)]">
        <img id="rsv1" src="../src/assets/reservation.svg" alt="" />
        <p id="rsv2" class="flex self-center text-white">예약</p>
      </div>
      <div
        id="profile"
        class="flex flex-col flex-wrap gap-y-2 py-2 max-[1023px]:shadow-[-10px_0_10px_-8px_rgba(0,0,0,0.2),10px_0_10px_-8px_rgba(0,0,0,0.2)]">
        <img id="profile1" src="../src/assets/profile.svg" alt="" />
        <p id="profile2" class="flex self-center text-white">프로필</p>
      </div>
    </div>

    <script>
      const rsvList = document.getElementById('reservation-list');
      const result = document.getElementById('result');
      const token = localStorage.getItem('accessToken');

      async function loadReservation() {
        try {
          const res = await fetch(
            'https://api.fullstackfamily.com/api/lattebnb/v1/me/reservations',
            {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
            },
          );

          if (!res.ok) {
            throw new Error('HTTP 오류: ' + res.stauts);
          }

          const rsvData = await res.json();
          const rsv = rsvData.data.reservations;
          const amdData = rsv.accommodation;
          const schData = rsv.schedule;

          if (rsv.length === 0) {
            result.textContent = '예약 내역이 없습니다.';
            return;
          }

          rsvList.textContent = '';

          for (let i = 0; i < rsv.length; i++) {
            const amd = amdData[i];
            const sch = schData[i];

            const resDiv = document.createElement('div');
            const cardDiv = document.createElement('div');
            cardDiv.className =
              'mx-auto w-full rounded-[8px] p-4 shadow-[0_0_0_2px_var(--color-shark-300)]';
            const cardImg = document.createElement('img');
            cardImg.className = 'mb-4 w-full';
            const cardName = document.createElement('p');
            cardName.className = 'font-bold';
            const cardPeriod = document.createElement('p');

            cardImg.src = amd.thumbnailUrl;
            cardName.textContent = amd.title;
            cardPeriod.textContent = sch.checkInDate + '~' + sch.checkOutDate;

            cardDiv.appendChild(cardImg);
            cardDiv.appendChild(cardName);
            cardDiv.appendChild(cardPeriod);
            resDiv.appendChild(cardDiv);
            rsvList.appendChild(resDiv);

            localStorage.setItem(rsv.status);
            console.log(rsv.status);
          }
        } catch (e) {
          result.textContent = '에러 발생: ' + e.message;
          result.sytle.color = 'red';
        }
      }

      loadReservation();

      const search = document.getElementById('search');
      const wish = document.getElementById('wish');
      const rsv = document.getElementById('rsv');
      const profile = document.getElementById('profile');

      search.addEventListener('click', () => {
        location.href = `../index.html`;
      });

      wish.addEventListener('click', () => {
        location.href = `../index.html`;
      });

      rsv.addEventListener('click', () => {
        location.href = `./`;
      });

      profile.addEventListener('click', () => {
        location.href = `../profile/index.html`;
      });
    </script>
  </body>
</html>
