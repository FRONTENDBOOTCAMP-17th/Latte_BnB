<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/main.js"></script>
    <script type="module" src="./index.js"></script>
    <title>latte-bnb | 예약 상세</title>
  </head>
  <body
    data-header="true"
    data-footer="true"
    data-nav="true"
    class="overflow-x-hidden max-lg:[&_footer]:hidden">
    <p
      id="info"
      class="mx-4 mt-4 border-b-2 border-shark-300 px-4 pb-4 text-[2rem] font-black md:flex md:w-lg md:flex-col md:flex-wrap md:justify-self-center lg:w-170.5">

    </p>
    <p id="result" class="flex justify-self-center font-semibold"></p>
    <button
      id="cancel"
      type="submit"
      class="m-6 flex justify-center justify-self-center gap-2 rounded-lg p-4 font-bold text-negative-600 shadow-[0_0_0_2px_var(--color-negative-600)] max-md:w-[calc(100%-2rem)] max-lg:mb-24 md:w-lg lg:w-170.5">
      예약 취소
      <img src="../src/assets/reservation-cancel.svg" alt="" />
