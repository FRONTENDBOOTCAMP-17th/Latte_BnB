<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>latte-bnb | 예약 상세</title>
    <style>
      body {
        overflow-x: hidden;
      }

      #info {
        font-size: 2rem;
        font-weight: 900;
        border-bottom: 2px solid var(--color-shark-300);
        padding: 0 1rem 1rem;
        margin: 1rem 1rem 0;
      }

      #name,
      #check,
      #guest,
      #price {
        font-size: 1.5rem;
        font-weight: 700;
      }

      @media (min-width: 768px) {
        #info,
        #roomInfo,
        #schedule,
        #guestInfo,
        #priceInfo,
        #cancel {
          display: flex;
          flex-flow: wrap column;
          justify-self: center;
          inline-size: 512px;
        }
      }

      @media (min-width: 1024px) {
        #info,
        #roomInfo,
        #schedule,
        #guestInfo,
        #priceInfo,
        #cancel {
          display: flex;
          flex-flow: wrap column;
          inline-size: 682px;
        }
      }

      @media (max-width: 767px) {
        #cancel {
          inline-size: calc(100% - 2rem);
        }
      }

      @media (max-width: 1023px) {
        body footer {
          display: none;
        }

        body #cancel {
          margin-block-end: 6rem;
        }
      }

      #roomInfo,
      #schedule,
      #guestInfo,
      #priceInfo {
        border-bottom: 2px solid var(--color-shark-300);
        padding: 1rem;
        margin-inline: 1rem;
      }

      #roomInfo {
        display: flex;
        flex-flow: wrap row;
      }

      #room {
        display: flex;
        flex-flow: wrap column;
        margin-inline-start: 1rem;
        row-gap: 1rem;
      }

      #inDay,
      #outDay {
        font-size: 1.25rem;
        font-weight: 700;
      }

      #location,
      #host,
      #checkIn,
      #checkOut,
      #people,
      #totalPrice {
        font-size: 1rem;
        font-weight: 600;
        color: var(--color-shark-500);
      }

      #people {
        margin-block-start: 1rem;
      }

      #schedule {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        row-gap: 1rem;
      }

      #priceInfo {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        row-gap: 1rem;
      }

      #totalPrice {
        align-self: center;
      }

      #total {
        font-size: 1.5rem;
        font-weight: 800;
        text-align: end;
      }

      #result {
        display: flex;
        justify-self: center;
        font-weight: 600;
      }

      #cancel {
        display: flex;
        flex-flow: nowrap row;
        justify-content: center;
        justify-self: center;
        gap: 0.5rem;
        margin: 1.5rem;
        padding: 1rem;
        font-weight: 700;
        border-radius: 8px;
        color: var(--color-red-600);
        box-shadow: 0 0 0 2px var(--color-red-600);
      }
    </style>
  </head>
  <body>
    <p id="info">예약 상세정보</p>
    <p id="result"></p>
    <button id="cancel" type="submit">
      예약 취소
      <img src="../src/assets/reservation-cancel.svg" alt="" />
    </button>

    <script>
      const reservationId = localStorage.getItem('id');
      const token = localStorage.getItem('accessToken');
      const result = document.getElementById('result');
      const cancel = document.getElementById('cancel');

      async function loadDetail() {
        try {
          const res = await fetch(
            `https://api.fullstackfamily.com/api/lattebnb/v1/reservations/${reservationId}`,
            {
              method: 'GET',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
            },
          );

          if (!res.ok) {
            throw new Error('HTTP 오류: ' + res.status);
          }

          const detailData = await res.json();
          const rsvDetail = detailData.data.reservation;
          const amdDetail = rsvDetail.accommodation;
          const [inyear, inmonth, inday] = rsvDetail.checkInDate.split('-');
          const [outyear, outmonth, outday] = rsvDetail.checkOutDate.split('-');
          const guestDetail = rsvDetail.guest;
          const priceDetail = rsvDetail.pricing;

          const container = document.createElement('div');
          container.id = 'container';

          container.innerHTML = `
            <div id="roomInfo">
              <img src="${amdDetail.thumbnailUrl}" alt="${amdDetail.title}" />
              <div id="room">
                <p id="name">${amdDetail.title}</p>
                <p id="location">${amdDetail.location.address}</p>
                <p id="host"></p>
              </div>
            </div>

            <div id="schedule">
              <p id="check">예약 일정</p>
              <p></p>
              <p id="checkIn">체크인</p>
              <p id="checkOut">체크아웃</p>
              <p id="inDay">${inmonth}월 ${inday}일 ${amdDetail.policies.checkInTime}</p>
              <p id="outDay">${outmonth}월 ${outday}일 ${amdDetail.policies.checkOutTime}</p>
            </div>

            <div id="guestInfo">
              <p id="guest">게스트</p>
              <p id="people">성인 ${guestDetail.adults}명, 어린이 ${guestDetail.children}명</p>
            </div>

            <div id="priceInfo">
              <p id="price">결제 정보</p>
              <p></p>
              <p id="totalPrice">총 결제 금액</p>
              <p id="total">${priceDetail.totalPrice}원</p>
            </div>
          `;

          document.body.insertBefore(container, cancel);
        } catch (e) {
          result.textContent = '상세 정보를 불러올 수 없습니다.';
          result.style.color = 'red';
        }
      }

      loadDetail();

      cancel.addEventListener('click', async () => {
        const isConfirm = confirm(`예약을 취소하시겠습니까?`);
        if (!isConfirm) return;

        try {
          const res = await fetch(
            `https://api.fullstackfamily.com/api/lattebnb/v1/reservations/${reservationId}/cancel`,
            {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
            },
          );

          if (!res.ok) {
            throw new Error('HTTP 오류: ' + res.status);
          } else {
            alert(`취소가 완료되었습니다.`);
            location.href(`../reservations-check`);
          }
        } catch (e) {
          alert('예약을 취소하지 못했습니다.\n' + e.message);
        }
      });
    </script>
  </body>
</html>
