<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>로그인 페이지</title>
  </head>
  <body class="bg-white text-shark-700">
    <div
      id="login"
      class="mx-auto my-8 flex min-w-100 max-w-150 flex-col justify-center pt-4 md:w-112.5 2xl:w-150">
      <p
        id="loginDes"
        class="mb-12 flex justify-center text-center text-2xl font-bold text-shark-700">
        로그인 또는 회원가입
      </p>
      <div id="loginData" class="grid grid-cols-[6rem_1fr] grid-rows-4 gap-y-2">
        <label
          id="id"
          for="loginId"
          class="flex h-11.25 items-center justify-center tracking-[0.2rem] text-shark-400"
          >아이디</label
        >
        <input
          type="text"
          id="loginId"
          placeholder="아이디를 입력해주세요."
          class="mr-8 h-11.25 rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-11.25"></p>
        <p id="result1" class="flex h-11.25 items-center text-xs font-bold"></p>

        <label
          id="pw"
          for="loginPw"
          class="flex h-11.25 items-center justify-center tracking-[0.2rem] text-shark-400"
          >비밀번호</label
        >
        <input
          type="password"
          id="loginPw"
          placeholder="비밀번호를 입력해주세요."
          class="mr-8 h-11.25 rounded-2xl border border-shark-400 px-3 py-3 outline-none transition focus:border-primary-300 focus:ring-2 focus:ring-primary-200" />
        <p class="h-11.25"></p>
        <p id="result2" class="flex h-11.25 items-center text-xs font-bold"></p>
      </div>
      <p
        id="result3"
        class="flex justify-center text-center text-xs font-bold"></p>
      <button
        type="submit"
        id="loginbtn"
        class="my-4 inline-flex w-40 cursor-pointer self-center rounded-lg bg-primary-300 px-4 py-4 text-center text-white transition duration-500 hover:bg-white hover:text-primary-300 hover:ring-2 hover:ring-primary-300">
        로그인
      </button>
      <p id="noId" class="flex justify-center text-center text-shark-700">
        아직 계정이 없으신가요? &nbsp;
        <a
          id="goSignup"
          href="../signup/index.html"
          class="underline underline-offset-2">
          회원가입
        </a>
      </p>
    </div>
  </body>
</html>
