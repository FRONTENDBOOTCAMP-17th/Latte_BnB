<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/main.js"></script>
    <script type="module" src="./index.js"></script>
    <title>latte-bnb | 로그인</title>
  </head>
  <body class="bg-white text-shark-800">
    <main
      class="max-w-160 mx-auto min-h-screen flex flex-col justify-center px-6">
      <a
        href="/"
        class="text-primary-400 flex items-center justify-center mb-10">
        <svg
          class="w-12 h-12"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 256 320"
          role="img"
          aria-label="latte bnb 로고">
          <path
            fill="currentColor"
            d="M128 12 C78 12 38 52 38 102 C38 170 93 220 121 248 C125 252 131 252 135 248 C163 220 218 170 218 102 C218 52 178 12 128 12Z" />
          <path
            fill="#FFFFFF"
            d="M127 70 L80 105 C77 108 78 114 82 114 L88 114 L88 150 C88 154 91 157 95 157 L161 157 C165 157 168 154 168 150 L168 114 L175 114 C180 114 181 108 178 106 L160 94 L160 74 C160 71 158 69 155 69 L145 69 C142 69 140 71 140 74 L140 79 L133 73 C130 70 126 70 123 73Z" />
          <rect
            x="110"
            y="108"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="132"
            y="108"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="110"
            y="130"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
          <rect
            x="132"
            y="130"
            width="14"
            height="14"
            rx="2"
            fill="currentColor" />
        </svg>
        <span class="font-semibold text-xl">lattebnb</span>
      </a>
      <div class="flex flex-col gap-3 px-2">
        <div class="flex flex-col gap-1">
          <label for="loginId" class="text-sm font-semibold text-shark-600"
            >아이디</label
          >
          <input
            type="text"
            id="loginId"
            placeholder="아이디를 입력해주세요."
            class="w-full px-1 py-3 border-0 border-b border-shark-400 text-sm outline-none focus:border-primary-400 bg-transparent placeholder:text-shark-300" />
          <p
            id="result1"
            class="flex h-5 items-center text-xs font-bold text-negative-500"></p>
        </div>

        <div class="flex flex-col gap-1">
          <label for="loginPw" class="text-sm font-semibold text-shark-600"
            >비밀번호</label
          >
          <input
            type="password"
            id="loginPw"
            placeholder="비밀번호를 입력해주세요."
            class="w-full px-1 py-3 border-0 border-b border-shark-400 text-sm outline-none focus:border-primary-400 bg-transparent placeholder:text-shark-300" />
          <p
            id="result2"
            class="flex h-5 items-center text-xs font-bold text-negative-500"></p>
        </div>

        <p
          id="result3"
          class="flex h-5 items-center justify-center text-xs font-bold text-negative-500"></p>

        <button
          type="submit"
          id="loginbtn"
          class="w-full p-4 rounded-lg text-base font-semibold cursor-pointer bg-primary-400 text-shark-50">
          로그인
        </button>

        <p class="text-sm text-shark-500 text-center">
          아직 계정이 없으신가요?
          <a
            href="../signup/"
            class="font-semibold text-shark-700 underline underline-offset-2">
            회원가입
          </a>
        </p>
      </div>
    </main>
  </body>
</html>
