<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="../src/main.js"></script>
    <script type="module" src="./index.js"></script>
    <title>latte-bnb | 로그인</title>
  </head>
  <body class="bg-white md:bg-primary-50 text-shark-800">
    <main
      class="max-w-3xl mx-auto min-h-screen flex items-center justify-center md:items-stretch px-6 py-10 min-w-110">
      <div
        class="w-full max-w-sm md:max-w-none md:w-1/2 md:bg-white md:border md:border-shark-200 px-8 py-7 md:flex md:flex-col md:justify-center">
        <p class="text-base text-shark-800 font-semibold mb-5 leading-snug">
          당신의 다음 여행지는 어디인가요?
          <br />
          LatteBnB에서 꿈꾸던 여행을 시작하세요!
        </p>

        <form id="loginForm" class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="loginId" class="text-sm font-semibold text-shark-600"
              >아이디</label
            >
            <input
              type="text"
              id="loginId"
              placeholder="아이디를 입력해주세요."
              class="w-full px-3 py-3 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
            <p id="errorUsername" class="text-xs text-negative-500"></p>
          </div>

          <div class="flex flex-col gap-1">
            <label for="loginPw" class="text-sm font-semibold text-shark-600"
              >비밀번호</label
            >
            <div class="relative">
              <input
                type="password"
                id="loginPw"
                placeholder="비밀번호를 입력해주세요."
                class="w-full px-3 py-3 pr-10 border border-shark-200 rounded-lg text-sm outline-none focus:border-primary-400 placeholder:text-shark-300" />
              <button
                type="button"
                id="togglePass"
                class="absolute right-4 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-shark-400 p-1">
                <svg
                  class="iconEye size-5"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
                <svg
                  class="iconEyeSlash size-5 hidden"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <p id="errorPassword" class="text-xs text-negative-500"></p>
          </div>

          <p id="errorCommon" class="text-xs text-negative-500 text-center"></p>

          <button
            type="submit"
            id="loginbtn"
            class="w-full p-4 rounded-lg text-base font-semibold cursor-pointer bg-primary-400 text-shark-50 hover:bg-primary-500">
            로그인
          </button>
        </form>

        <p class="text-sm text-shark-500 text-center mt-4">
          아직 계정이 없으신가요?
          <a
            href="../signup/"
            class="font-semibold text-primary-400 hover:text-primary-500">
            회원가입
          </a>
        </p>
      </div>
      <div class="hidden md:flex md:items-center md:justify-center w-1/2">
        <img
          src="../src/assets/phonemockup.png"
          class="max-h-150 object-contain" />
      </div>
      <div
        id="modalContainer"
        class="fixed inset-0 flex items-center justify-center bg-[color-mix(in_oklab,var(--color-black)_50%,transparent)] transition-opacity duration-300 ease-[ease] invisible opacity-0">
        <div
          id="loginModal"
          class="flex flex-col flex-wrap gap-6 rounded-lg bg-shark-50 px-10 py-6">
          <p class="font-bold">로그인되었습니다.</p>
          <button
            type="button"
            id="loginConfirmBtn"
            class="flex-1 rounded-lg bg-primary-400 p-2 text-white">
            확인
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
