<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <script type="module" src="./index.js"></script>
    <title>로그인 페이지</title>
    <style>
      #login {
        display: flex;
        flex-flow: wrap column;
        justify-content: center;
        min-width: 400px;
        margin: 2rem;
        padding-block-start: 1rem;
      }

      #loginDes {
        display: flex;
        justify-content: center;
        margin-block-end: 3rem;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--color-shark-700);
      }

      #loginData {
        display: grid;
        grid-template-columns: 6rem 1fr;
        grid-template-rows: repeat(4, 45px);
        row-gap: 0.5rem;
      }

      #id,
      #pw {
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--color-shark-400);
        letter-spacing: 0.2rem;
      }

      #loginId,
      #loginPw {
        padding: 0.75rem;
        margin-inline-end: 2rem;
        border: 1px solid var(--color-shark-400);
        border-radius: 1rem;
      }

      #result1,
      #result2 {
        display: flex;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #result3 {
        display: flex;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
      }

      #loginbtn {
        display: flex;
        justify-content: center;
        align-self: center;
        cursor: pointer;
        inline-size: 10rem;
        margin-block: 1rem;
        padding: 1rem;
        border-radius: 0.5rem;
        background-color: var(--color-primary-300);
        color: var(--color-white);
        transition-duration: 500ms;
      }

      #loginbtn:hover {
        background-color: var(--color-white);
        color: var(--color-primary-300);
        box-shadow: 0 0 0 2px var(--color-primary-300);
      }

      #noId {
        display: flex;
        flex-flow: nowrap row;
        justify-content: center;
      }

      #noId a {
        text-decoration: underline;
      }

      @media (min-width: 768px) {
        #login {
          width: 450px;
          justify-self: center;
        }
      }

      @media (min-width: 1920px) {
        #login {
          width: 600px;
          justify-self: center;
        }
      }
    </style>
  </head>
  <body>
    <div id="login">
      <p id="loginDes">로그인 또는 회원가입</p>
      <div id="loginData">
        <label id="id" for="loginId">아이디</label>
        <input type="text" id="loginId" placeholder="아이디를 입력해주세요." />
        <p></p>
        <p id="result1"></p>

        <label id="pw" for="loginPw">비밀번호</label>
        <input
          type="password"
          id="loginPw"
          placeholder="비밀번호를 입력해주세요." />
        <p></p>
        <p id="result2"></p>
      </div>
      <p id="result3"></p>
      <button type="submit" id="loginbtn">로그인</button>
      <p id="noId">
        아직 계정이 없으신가요? &nbsp;
        <a id="goSignup" href="../signup/index.html">회원가입</a>
      </p>
    </div>
  </body>
</html>
