<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>
    <style>
      body {
        display: flex;
        flex-flow: nowrap column;
        justify-content: center;
        gap: 3rem;
        padding-block: 2rem;
        margin: 0;

        @media (width >= 768px) {
          inline-size: 450px;
          justify-self: center;
        }

        @media (width >= 1920px) {
          inline-size: 600px;
          justify-self: center;
        }
      }

      p {
        display: flex;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }

      #id,
      #pwd,
      #name,
      #phone {
        display: flex;
        flex-flow: wrap column;
        gap: 2rem;
      }

      input[type='text'] {
        padding-block: 0.75rem;
        padding-inline-start: 0.75rem;
        border-radius: 0.5rem;
        margin-inline: 20px;
      }

      div > label {
        margin-inline-start: 1rem;
        color: gray;
      }

      #lattebtn {
        background: #ff8194;
        border-radius: 0.5rem;
        display: flex;
        justify-content: center;
        align-self: center;
        inline-size: 10rem;
        padding: 1rem;
      }
    </style>
  </head>
  <body>
    <p>에어비앤비에 오신 것을 환영합니다!</p>
    <div id="id">
      <label for="latteId">아이디</label>
      <input type="text" id="latteId" placeholder="아이디를 입력해주세요." />
    </div>
    <div id="pwd">
      <label for="lattePw">비밀번호</label>
      <input type="text" id="lattePw" placeholder="비밀번호를 입력해주세요." />
    </div>
    <div id="name">
      <label for="latteNm">이름</label>
      <input type="text" id="latteNm" placeholder="이름을 입력해주세요." />
    </div>
    <div id="phone">
      <label for="lattePn">전화번호</label>
      <input type="text" id="lattePn" placeholder="예) 010-1234-5678" />
    </div>
    <button type="submit" id="lattebtn">회원가입</button>
  </body>
</html>
