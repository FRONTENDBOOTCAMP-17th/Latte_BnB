<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../src/style.css" />
    <title>회원가입 페이지</title>
    <style>
      .signup-card {
        background: var(--color-pink-100);
        /* box-shadow: 8px 5px var(--color-rose-300); */
        display: flex;
        flex-flow: nowrap column;
        justify-content: center;
        gap: 3rem;
        padding-block: 2rem;
        margin: 2rem;
        border-radius: 10px;
        min-width: 416px;
        transition-duration: 500ms;

        @media (width >= 768px) {
          inline-size: 450px;
          justify-self: center;
        }

        @media (width >= 1920px) {
          inline-size: 600px;
          justify-self: center;
        }
      }

      .signup-card:hover {
        transform: translate(-5px, -10px);
        /* box-shadow: 12px 8px var(--color-rose-200); */
      }

      p {
        color: var(--color-slate-700);
        display: flex;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }

      #id,
      #pwd,
      #name,
      #phone {
        display: flex;
        flex-flow: wrap column;
        gap: 2rem;
      }

      input[type='text'] {
        background: var(--color-white);
        padding-block: 0.75rem;
        padding-inline-start: 0.75rem;
        border: none;
        border-radius: 1rem;
        margin-inline: 4rem;
      }

      div > label {
        color: var(--color-shark-400);
        margin-inline-start: 2rem;
      }

      #lattebtn {
        background: var(--color-rose-300);
        border-radius: 0.5rem;
        display: flex;
        justify-content: center;
        align-self: center;
        inline-size: 10rem;
        padding: 1rem;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="signup-card">
      <p>라떼비앤비에 오신 것을 환영합니다!</p>
      <div id="id">
        <label for="latteId">아이디</label>
        <input type="text" id="latteId" placeholder="아이디를 입력해주세요." />
      </div>
      <div id="pwd">
        <label for="lattePw">비밀번호</label>
        <input
          type="text"
          id="lattePw"
          placeholder="비밀번호를 입력해주세요." />
      </div>
      <div id="name">
        <label for="latteNm">이름</label>
        <input type="text" id="latteNm" placeholder="이름을 입력해주세요." />
      </div>
      <div id="phone">
        <label for="lattePn">전화번호</label>
        <input type="text" id="lattePn" placeholder="예) 010-1234-5678" />
      </div>
      <button type="submit" id="lattebtn">회원가입</button>
    </div>
  </body>
</html>
